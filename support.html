<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>街針 サポート</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #faf6ef;
    --fg: #1c1c1e;
    --muted: #6b6b70;
    --accent: #2f5f9e;
    --card: #ffffff;
    --border: #e6ddc9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14202e;
      --fg: #eef1f5;
      --muted: #9aa7b4;
      --accent: #8fbaf0;
      --card: #1c2c3d;
      --border: #2a3d52;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    line-height: 1.75;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 32px;
  }
  section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  h2 {
    font-size: 1.02rem;
    margin: 0 0 8px;
    color: var(--accent);
  }
  p {
    margin: 0;
    font-size: 0.96rem;
  }
  a {
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }
  footer {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 24px;
  }
</style>
</head>
<body>
<main>
  <h1>街針 サポート</h1>

  <section>
    <h2>お問い合わせ</h2>
    <p>不具合報告・ご質問・ご要望は X (旧Twitter) の <a href="https://x.com/StnVoy" target="_blank" rel="noopener">@StnVoy</a> までDMまたはメンションでご連絡ください。</p>
  </section>

  <section>
    <h2>よくある質問</h2>
    <p>現時点でよくある質問はありません。困りごとがあれば上記からお気軽にご連絡ください。</p>
  </section>

  <footer><a href="./">プライバシーポリシーはこちら</a></footer>
</main>
</body>
</html>
